<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Habit Tracker — Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #344258;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100%, 420px);
        padding: 32px;
        border: 1px solid #d8e1ed;
        border-radius: 16px;
        background: white;
        text-align: center;
      }
      img { width: 72px; height: 72px; border-radius: 16px; }
      h1 { margin: 20px 0 8px; font-size: 24px; }
      p { margin: 0; color: #718096; line-height: 1.5; }
      button {
        margin-top: 24px;
        min-height: 44px;
        padding: 0 20px;
        border: 0;
        border-radius: 8px;
        background: #344258;
        color: white;
        font: inherit;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="">
      <h1>You’re offline</h1>
      <p>Your habit data stays private and is not cached on this device. Reconnect to view or update it.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
